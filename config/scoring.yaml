# ============================================================
# Redrob Hackathon — Scoring Configuration
# All weights must sum to 1.0 within each section.
# ============================================================

# ---- Technical score weights (sum = 1.0) ----
tech_weights:
  core_skills_match: 0.35      # Exact + synonym match against JD must-haves
  career_substance: 0.30       # Product company experience; shipped systems
  experience_fit: 0.20         # YOE in 4-10yr band + trajectory
  skill_trust: 0.10            # endorsements × duration × proficiency (anti-stuffing)
  education_tier: 0.05         # tier_1..tier_4

# ---- Behavioral multiplier range ----
behavioral:
  min_multiplier: 0.50         # Ghost candidate, no engagement
  max_multiplier: 1.50         # Highly engaged, available, trusted
  # Sub-component weights within behavioral (sum = 1.0)
  availability_weight: 0.40    # open_to_work, recency, notice period
  engagement_weight: 0.35      # response rate, interview completion, profile completeness
  platform_trust_weight: 0.25  # verified signals, assessments, github

# ---- Experience fit params ----
experience:
  ideal_min_yrs: 4.0
  ideal_max_yrs: 10.0
  sweet_spot_min: 5.0          # Extra bonus in this band
  sweet_spot_max: 9.0

# ---- Notice period scoring ----
notice_period:
  sub_30_days_score: 1.0
  days_30_to_60_score: 0.8
  days_60_to_90_score: 0.6
  days_90_to_120_score: 0.4
  over_120_days_score: 0.2

# ---- Recency decay ----
recency:
  days_30_score: 1.0
  days_90_score: 0.8
  days_180_score: 0.5
  days_365_score: 0.25
  over_365_score: 0.05

# ---- Education tier scores ----
education:
  tier_1: 1.00
  tier_2: 0.85
  tier_3: 0.70
  tier_4: 0.55
  unknown: 0.60

# ---- Consulting-only penalty ----
consulting_only_multiplier: 0.40
consulting_firms:
  - "tcs"
  - "infosys"
  - "wipro"
  - "accenture"
  - "cognizant"
  - "capgemini"
  - "hcl"
  - "tech mahindra"
  - "mphasis"
  - "hexaware"

# ---- Hard disqualifier titles (must have ZERO product tech roles too) ----

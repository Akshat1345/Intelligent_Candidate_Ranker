ai_usage_summary: |
  Used Claude for architecture review, README drafting, and validation-oriented code analysis.
  Used GitHub Copilot for implementation assistance and iterative code edits.
  No candidate data was sent to hosted LLM APIs during ranking.

methodology_summary: |
  Deterministic four-layer candidate ranker for the Redrob Senior AI Engineer challenge.
  Layer 1 detects honeypots with a stacked impossibility score calibrated at a 1.5-point threshold.
  Layer 2 applies only the JD-explicit hard disqualifiers, including pure non-tech careers, consulting-only careers, and CV/speech/robotics profiles with no NLP/IR exposure.
  Layer 3 computes technical fit using JD-required skills, title-based AI career depth, career substance, experience fit, skill trust, trajectory, and education. Layer 4 applies a behavioral multiplier from availability, engagement, platform trust, GitHub activity, and location. The implementation is CPU-only, deterministic, and designed to produce recruiter-style reasoning for manual review.

